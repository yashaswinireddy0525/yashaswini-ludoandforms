<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>company feedback</title>
    <link rel="stylesheet" href="formstask.css">
</head>
<body bgcolor="pink">
    <fieldset style="width:450px">
         <center>
            <h1 style="color: rgb(5, 5, 33)"> COMPANY FEEDBACK FORM</h1>
         </center>
    <hr width="80%" />
    <center>
        <font size="7">&#128077;</font>
    </center>
    <form>
        <fieldset>
            <center>
                <h2>Please rate the job</h2>
            </center>
        </fieldset>

        <table border="1" height="100" width="600" cellspacing="0" align="center">
          <tr>
            <td><label>Venue:</label></td>
            <td><input type="radio" name="qos" value="excellent" />Excellent
                <input type="radio" name="qos" value="good"/>Good 
                <input type="radio" name="qos" value="poor"/>Poor
            
            </td>
          </tr>
          <tr>
            <td><label>Speakers:</label></td>
            <td><input type="radio" name="qos" value="excellent" />Excellent
                <input type="radio" name="qos" value="good"/>Good 
                <input type="radio" name="qos" value="poor"/>Poor
            
            </td>
          </tr>
          <tr>
            <td><label>Activities:</label></td>
            <td><input type="radio" name="qos" value="excellent" />Excellent
                <input type="radio" name="qos" value="good"/>Good 
                <input type="radio" name="qos" value="poor"/>Poor
            
            </td>
          </tr>
        </table>
        <h2> Additional Comments:</h2>
        <textarea rows="4" cols="90"></textarea>
        <ol>
            <li>What do you like about your job?</li>
            <li>Any areas for improvement?</li>
        </ol>
        
        <hr width="80%"/>
        <center>
            <input type="submit" value="Submit"/>
            <input type="submit" value="Reset"
        </center>
    </form>
    </fieldset>
</body>
</html>
