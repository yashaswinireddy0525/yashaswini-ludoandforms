<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EVENT FEEDBACK</title>
    <link rel="stylesheet" href="formstask.css">
  </head>
  <body>
    <fieldset style="width: 450px">
      <center>
        <h1 style="color: blue">EVENT FEEDBACK FORM</h1>
      </center>
      <hr width="80%" />
      <center>
        <font size="9">&#128;</font>
      </center>
      <hr width="80%"/>
      <form>
        <h2>Please Rate the Event:</h2>
        <ul>
          <li>What do you like about the Event?</li>
          <li>What could be improved?</li>
        </ul>
        <table
          border="1"
          height="100"
          width="600"
          cellspacing="0"
          align="center"
        >
          <tr>
            <td></td>
            <td>Excellent</td>
            <td>Good</td>
            <td>Fair</td>
            <td>Poor</td>
          </tr>
          <tr>
            <td>Venue:</td>
            <td><input type="radio" name="ven" value="e" /></td>
            <td><input type="radio" name="ven" value="g" /></td>
            <td><input type="radio" name="ven" value="f" /></td>
            <td><input type="radio" name="ven" value="p" /></td>
          </tr>
          <tr>
            <td>Speakers:</td>
            <td><input type="radio" name="ven" value="e" /></td>
            <td><input type="radio" name="ven" value="g" /></td>
            <td><input type="radio" name="ven" value="f" /></td>
            <td><input type="radio" name="ven" value="p" /></td>
          </tr>
          <tr>
            <td>Activities:</td>
            <td><input type="radio" name="ven" value="e" /></td>
            <td><input type="radio" name="ven" value="g" /></td>
            <td><input type="radio" name="ven" value="f" /></td>
            <td><input type="radio" name="ven" value="p" /></td>
          </tr>
        </table>
        <hr width="80%" />
        <center>
          <input type="submit" value="Submit" />
          <input type="submit" value="Reset"/>
        </center>
      </form>
    </fieldset>
  </body>
</html>
