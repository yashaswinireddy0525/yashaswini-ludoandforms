<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>website feedback form</title>
</head>
<body>
    <fieldset style="width:450px">
         <center>
            <h1 style="color: rgb(5, 5, 33)"> &#127757;WEBSITE FEEDBACK FORM</h1>
         </center>
    <hr width="80%" />
    <center>
        <font size="7">&#127757;</font>
    </center>
    <form>
        <table border="1" height="100" width="600" cellspacing="0" align="center">
          <tr>
            <td><label>Quality of service:</label></td>
            <td><input type="radio" name="eon" value="yes"/>Yes</td>
            <td><input type="radio" name="eon" value="no"/>No</td>
          </tr>
          <tr>
            <td><label>Content Quality:</label></td>
            <td><input type="radio" name="eon" value="yes"/>Yes</td>
            <td><input type="radio" name="eon" value="no"/>No</td>
            
          </tr>
          <tr>
            <td><label>Loading Speed:</label></td>
            <td><input type="radio" name="eon" value="yes"/>Yes</td>
            <td><input type="radio" name="eon" value="no"/>No</td>
          </tr>
          <tr>
            <td><label>Overall Experience:</label></td>
            <td><input type="radio" name="qos" value="excellent" />Excellent
                <input type="radio" name="qos" value="good"/>Good 
                <input type="radio" name="qos" value="poor"/>Poor
            
            </td>
          </tr>
        </table>
        <ol>
            <li>What did you enjoy about the Site?</li>
            <li>Any suggestions for improvement?</li>
        </ol>
        
        <hr width="80%"/>
        <center>
            <input type="submit" value="Submit"/>
            <input type="submit" value="Reset"
        </center>
    </form>
    </fieldset>
    
</body>
</html>
