<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <fieldset style="width:450px">
         <center>
            <h1 style="color: blue">University APPLICATION FORM</h1>

    <hr width="80%" />
    <center>
        <font size="7">&#127963;</font>
    </center>
    <form>
        <table border="1" height="100" width="600" cellspacing="0" align="center">
          <tr>
            <td><label>Name:</label></td>
            <td><input type="text" placeholder="enter your name" /></td>
          </tr>
          <tr>
            <td><label>DOB:</label></td>
            <td><input type="date" placeholder="dd/mm/yy" /></td>
          </tr>
          <tr>
            <td><label>Email:</label></td>
            <td><input type="email" placeholder="@gmail.com" /></td>
          </tr>
          <tr>
            <td>Desired Program:</td>
            <td></td>
          </tr>
        </table>
        <h2>Admission Requirements:</h2>
        <ol>
            <li>Completed Application Form</li>
            <li>Transcripts</li>
            <li>Personal Statement</li>
        </ol>
        <hr width="80%"/>
        <center>
            <input type="submit" value="submit"/>
        </center>
    </form>
    </fieldset>
</body>
</html>
