<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey form</title>
</head>
<body>
    <fieldset style="width: 450px">
      <center>
        <h1 style="color: rgb(5, 5, 31)">SURVEY FORM</h1>
      </center>
      <hr width="80%" />

      <form>
        <table
          border="1"
          height="100"
          width="600"
          cellspacing="0"
          align="center"
        >
          <tr>
            <td bgcolor="lightgray"><label>How Satisfied are you?</label></td>
          </tr>
          <tr>
            <td><input type="radio" name="sat" value="vs"/>Very Satisfied</td>
            
          </tr>
          <tr>
            <td><input type="radio" name="sat" value="n"/>Neutral</td>
          </tr>
          <tr>
            <td><input type="radio" name="sat" value="ds"/>Dissatisfied</td>
          </tr>
        </table><br/>
        <table bgcolor="lightgray" width="600">
            <tr>
                <td><label>Comments:</label><br/>
            <textarea rows="2" cols="70"></textarea></td>
            </tr>
        </table>
        <center>
          <input type="submit" value="Submit" />
          <input type="submit" value="Clear" />
        </center>
      </form>
    </fieldset>
    
</body>
</html>
