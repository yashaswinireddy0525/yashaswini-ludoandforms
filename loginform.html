<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
</head>
<body>
   <fieldset style="width:450px">
         <center>
            <h1 style="color:blue">LOGIN FORM</h1>
         </center>
    <hr width="80%" />
    
    <form>
        <table border="1" height="100" width="600" cellspacing="0" align="center" bgcolor="lightgray">
          <tr>
            <td><label>UserName:</label>
            <input type="text"/>
            </td>
          </tr>
          <tr>
            <td><label>Password:</label>
                <input type="password"/>
            </td>
            
          </tr>
         
        </table>
        <input type="checkbox" name="rm" value="rm"/>Remember Me:
        <hr width="80%"/>
        <center>
            <input type="submit" value="Submit"/>
            <input type="submit" value="Reset"/>
        </center>
    </form>
    </fieldset>
</body>
</html>
