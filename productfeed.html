<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Feedback</title>
</head>
<body>
    <fieldset style="width:450px">
         <center>
            <h1 style="color: rgb(9, 9, 90)">PRODUCT FEEDBACK SURVEY</h1>
         </center>
    <hr width="80%" />
    <center>
        <font size="7">&#128248;</font>
    </center>
    <form>
        <table border="1" height="100" width="600" cellspacing="0" align="center">
          <tr>
            <td></td>
            <td>1</td>
            <td>2</td>
            <td>3</td>
            <td>4</td>
            <td>5</td>
          </tr>
          <tr>
            <td>Rate this product</td>
            <td><input type="radio" name="rate" value="poor"/>Poor</td>
            <td><input type="radio" name="rate" value="average"/>Average</td>
            <td><input type="radio" name="rate" value="good"/>Good</td>
            <td><input type="radio" name="rate" value="verygood"/>Verygood</td>
            <td><input type="radio" name="rate" value="excellent"/>Excellent</td>
            
          </tr>
        </table>
        <h2>Oatly:</h2>
        <ul>
            <li>What did you like about the product?</li>
            <li>What could be Improved?</li>
        </ul>
        <hr width="80%"/>
        <center>
            <input type="submit" value="Submit"/>
            <input type="submit" value="Reset"/>
        </center>
    </form>
    </fieldset>
</body>
</html>
