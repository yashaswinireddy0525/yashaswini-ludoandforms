<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Booking</title>
</head>
<body>
     <fieldset style="width: 450px">
      <center>
        <h1 style="color: rgb(5, 5, 31)">HOTEL BOOKING</h1>
      </center>
      <hr width="80%" />
      <center>
        <img src="assests/nature.jpg" height="300" width="600"/>

      </center>
      <form>
        <table
          border="1"
          height="100"
          width="600"
          cellspacing="0"
          align="center"
        >
          <tr>
            <td bgcolor="lightgray"><label>Check-in Date:</label>
                <input type="date"/>
            
            </td>
          </tr>
          <tr>
            <td bgcolor="lightgray"><label>Check-out Date:</label>
                <input type="date"/></td>
            
          </tr>
          <tr>
            <td bgcolor="lightgray"><label>Number of Guests:</label>
                <input type="number"/></td>
          </tr>
        </table><br/>
        
        <center>
          <input type="submit" value="Book Now" />
          <input type="submit" value="Cancel" />
        </center>
      </form>
    </fieldset>
    
</body>
</html>
