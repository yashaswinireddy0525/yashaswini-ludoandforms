<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Feedback</title>
    <link rel="stylesheet" href="formstask.css">
</head>
<body bgcolor="gray">
    <fieldset style="width:450px">
         <center>
            <h1 style="color: rgb(5, 5, 33)"> CUSTOMER FEEDBACK FORM</h1>
         </center>
    <hr width="80%" />
    <center>
        <font size="7">&#128077;</font>
    </center>
    <form>
        <table border="1" height="100" width="600" cellspacing="0" align="center">
          <tr>
            <td><label>Quality of service:</label></td>
            <td><input type="radio" name="qos" value="excellent" />Excellent
                <input type="radio" name="qos" value="good"/>Good 
                <input type="radio" name="qos" value="poor"/>Poor
            
            </td>
          </tr>
          <tr>
            <td><label>Cleanliness:</label></td>
            <td><input type="radio" name="qos" value="excellent" />Excellent
                <input type="radio" name="qos" value="good"/>Good 
                <input type="radio" name="qos" value="poor"/>Poor
            
            </td>
          </tr>
          <tr>
            <td><label>Staff Friendliness:</label></td>
            <td><input type="radio" name="qos" value="excellent" />Excellent
                <input type="radio" name="qos" value="good"/>Good 
                <input type="radio" name="qos" value="poor"/>Poor
            
            </td>
          </tr>
          <tr>
            <td><label>Overall Experience:</label></td>
            <td><input type="radio" name="qos" value="excellent" />Excellent
                <input type="radio" name="qos" value="good"/>Good 
                <input type="radio" name="qos" value="poor"/>Poor
            
            </td>
          </tr>
        </table>
        <h2>Comments:</h2>
        <textarea rows="4" cols="90"></textarea>
        
        <hr width="80%"/>
        <center>
            <input type="submit" value="Submit"/>
            <input type="submit" value="Reset"
        </center>
    </form>
    </fieldset>
    
</body>
</html>
