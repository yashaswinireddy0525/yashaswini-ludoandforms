<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration</title>
    <link rel="stylesheet" href="formstask.css">
</head>
<body bgcolor="lightpink">
    <fieldset style="width:450px">
         <center>
            <h1 style="color: blue">EVENT REGISTRATION FORM</h1>
         </center>
    <hr width="80%" />
    <center>
        <font size="7">&#128198;</font>
    </center>
    <form>
        <table border="1" height="100" width="600" cellspacing="0" align="center">
          <tr>
            <td><label>Name:</label></td>
            <td><input type="text" placeholder="enter your name" /></td>
          </tr>
          <tr>
            <td><label>Email:</label></td>
            <td><input type="email" placeholder="@gmail.com" /></td>
          </tr>
          <tr>
            <td><label>Phone:</label></td>
            <td><input type="tel" placeholder="Eg:987654321" /></td>
          </tr>
        </table>
        <h2>Select Workshop:</h2>
        <ul>
            <li>Web Development</li>
            <li>Digital Marketing</li>
            <li>Data Analysis</li>
        </ul>
        <hr width="80%"/>
        <center>
            <input type="submit" value="Register"/>
        </center>
    </form>
    </fieldset>
</body>
</html>
