<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Application</title>
</head>
<body>
    <fieldset style="width:450px">
         <center>
            <h1 style="color: blue">VOLUNTEER APPLICATION</h1>
         </center>
    <hr width="80%" />
    <center>
        <font size="7">&#129303;</font>
    </center>
    <form>
        <table border="1" height="100" width="600" cellspacing="0" align="center">
          <tr>
            <td><label>Name:</label></td>
            <td><input type="text" placeholder="enter your name" /></td>
          </tr>
          <tr>
            <td><label>Phone:</label></td>
            <td><input type="tel" placeholder="Eg:987654321" /></td>
          </tr>
          <tr>
            <td><label>Availability:</label></td>
            <td><input type="radio" name="avail" value="Yes" />Yes
                <input type="radio" name="avail" value="No"/>No
            
            </td>
          </tr>
        </table>
        <h2>Areas of Intrest:</h2>
        <ul>
            <li>Community Outreach</li>
            <li>Environmental Work</li>
            <li>Fundraising</li>
        </ul>
        <hr width="80%"/>
        <center>
            <input type="submit" value="Sign Up"/>
        </center>
    </form>
    </fieldset>
</body>
</html>
