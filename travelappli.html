<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Application Form</title>
</head>
<body>
    <fieldset style="width:450px">
         <center>
            <h1 style="color: blue">TRAVEL APPLICATION</h1>
         </center>
    <hr width="80%" />
    <center>
        <font size="8">&#9992;</font>
    </center>
    <form>
        <table border="1" height="100" width="600" cellspacing="0" align="center">
          <tr>
            <td><label> Full Name:</label></td>
            <td><input type="text" placeholder="enter your name" /></td>
          </tr>
          <tr>
            <td><label>Email:</label></td>
            <td><input type="email" placeholder="@gmail.com" /></td>
          </tr>
          <tr>
            <td><label>Destination:</label></td>
            <td><input type="text" placeholder="Eg:bengaluru" /></td>
          </tr>
          <tr>
            <td><label>Travel date:</label></td>
            <td><input type="date" placeholder="dd/mm/yy"/></td>
          </tr>
        </table>
        <h2>Travel Preferences:</h2>
        <ul>
            <li>Window Seat</li>
            <li>Vegetarian Meal</li>
            <li>Travel Insurance</li>
        </ul>
        <hr width="80%"/>
        <center>
            <input type="submit" value="Apply"/>
        </center>
    </form>
    </fieldset>
</body>
</html>
